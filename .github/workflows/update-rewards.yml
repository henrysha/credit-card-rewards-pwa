name: Update Credit Card Rewards Data

on:
  schedule:
    # Runs every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-rewards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run rewards update script
        run: node scripts/update-rewards.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet src/db/seed-data.ts; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update credit card rewards data'
          title: '🔄 Weekly Rewards Data Update'
          body: |
            Automated weekly update of credit card rewards data.
            
            Please review the changes to `src/db/seed-data.ts` to verify accuracy.
            
            ---
            *Generated by the weekly rewards update action*
          branch: rewards-update
          delete-branch: true
          labels: rewards-update,automated
